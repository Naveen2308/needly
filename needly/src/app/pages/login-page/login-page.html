<div class="min-h-screen flex flex-col items-center justify-center bg-white p-6 font-body">
  <ng-container *ngIf="!auth.authReady()">
    <div class="flex items-center justify-center">
      <span class="text-sm font-bold uppercase tracking-widest">Loading...</span>
    </div>
  </ng-container>
  <ng-container *ngIf="auth.authReady()">
    <main class="w-full max-w-md">
      <!-- Center-aligned Logo -->
      <div class="flex flex-col items-center mb-10">
        <app-logo variant="long" customClass="mb-6"></app-logo>
        <h1 class="text-3xl font-bold text-black mb-2 uppercase tracking-tight" style="font-family: 'Manrope', sans-serif;">Welcome back</h1>
        <p class="text-slate-500 text-center text-sm uppercase tracking-widest">Please enter your details to sign in.</p>
      </div>

      <!-- Minimal Login Form -->
      <form class="space-y-6" (submit)="onSubmit()">
        <div *ngIf="auth.error()" class="bg-red-50 text-red-600 p-3 text-xs font-bold uppercase tracking-wider border border-red-100">
          {{ auth.error() }}
        </div>

        <app-input
          label="Email Address"
          type="email"
          placeholder="NAME@COMPANY.COM"
          id="email"
          [(value)]="credentials.email"
          name="email"
        ></app-input>

        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <label class="text-[0.625rem] font-black text-black uppercase tracking-[0.15em] ml-1">Password</label>
            <a routerLink="/forgot-password" class="text-[0.6875rem] font-bold text-black hover:underline underline-offset-4 uppercase tracking-wider">Forgot password?</a>
          </div>
          <app-input
            type="password"
            placeholder="••••••••"
            id="password"
            [(value)]="credentials.password"
            name="password"
          >
            <button suffix type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-black">
              <span class="material-symbols-outlined text-xl">visibility</span>
            </button>
          </app-input>
        </div>

        <div class="pt-2">
          <app-button variant="primary" type="submit" [disabled]="auth.loading()">
            {{ auth.loading() ? 'SIGNING IN...' : 'SIGN IN' }}
          </app-button>
        </div>
      </form>

      <div class="relative my-10">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-black/10"></div>
        </div>
        <div class="relative flex justify-center text-[0.625rem] uppercase tracking-[0.2em]">
          <span class="bg-white px-4 text-neutral-400">Or continue with</span>
        </div>
      </div>

      <app-button variant="secondary" (onClick)="onGoogleLogin()">
        <svg class="w-4 h-4" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="currentColor"></path>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path>
        </svg>
        <span class="font-bold text-xs uppercase tracking-wider ml-1">Sign in with Google</span>
      </app-button>

      <p class="mt-10 text-center text-[0.6875rem] text-slate-500 uppercase tracking-widest">
        Don't have an account? 
        <a routerLink="/signup" class="text-black font-black hover:underline underline-offset-4 ml-2">Sign up</a>
      </p>
    </main>
  </ng-container>
</div>
