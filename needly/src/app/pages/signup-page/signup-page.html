<div class="min-h-screen bg-white text-black py-8 px-6 flex flex-col items-center justify-center font-body">
  <main class="w-full max-w-md relative z-10">
    <!-- Signup Form Card -->
    <app-card [footer]="true" customClass="p-6 md:p-8">
      <div class="flex flex-col items-center mb-10 text-center">
        <app-logo variant="long" customClass="mb-8"></app-logo>
        <h2 class="text-3xl font-bold text-black tracking-tight uppercase" style="font-family: 'Manrope', sans-serif;">Create Account</h2>
        <p class="text-neutral-500 text-[0.625rem] mt-3 uppercase tracking-[0.2em]">Architectural Curator Design</p>
      </div>

      <form class="space-y-6" (submit)="onSubmit()">
        <div *ngIf="auth.error()" class="bg-red-50 text-red-600 p-3 text-xs font-bold uppercase tracking-wider border border-red-100 mb-6">
          {{ auth.error() }}
        </div>

        <!-- Social Sign up -->
        <app-button variant="secondary" (onClick)="onGoogleLogin()">
          <svg class="w-4 h-4" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="currentColor"></path>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path>
          </svg>
          <span class="font-bold text-xs uppercase tracking-wider ml-1">Sign up with Google</span>
        </app-button>

        <div class="relative flex items-center py-4">
          <div class="flex-grow border-t border-black/10"></div>
          <span class="flex-shrink mx-4 text-neutral-400 text-[0.625rem] uppercase tracking-[0.2em]">Or with email</span>
          <div class="flex-grow border-t border-black/10"></div>
        </div>

        <!-- Form Fields -->
        <div class="space-y-5">
           <app-input
            label="Full Name"
            type="text"
            placeholder="YOUR NAME"
            id="name"
            [(value)]="userData.name"
            name="name"
          ></app-input>

          <app-input
            label="Email Address"
            type="email"
            placeholder="NAME@COMPANY.COM"
            id="email"
            [(value)]="userData.email"
            name="email"
          ></app-input>

          <app-input
            label="Password"
            type="password"
            placeholder="••••••••"
            id="password"
            [(value)]="userData.password"
            name="password"
          ></app-input>

          <app-input
            label="Confirm Password"
            type="password"
            placeholder="••••••••"
            id="confirm-password"
            [(value)]="userData.confirmPassword"
            name="confirmPassword"
          ></app-input>
        </div>

        <div class="pt-6">
          <app-button variant="primary" type="submit" [disabled]="auth.loading()">
            {{ auth.loading() ? 'CREATING ACCOUNT...' : 'Create Account' }}
          </app-button>
        </div>
      </form>

      <div footer class="text-center">
        <p class="text-[0.6875rem] text-neutral-500 uppercase tracking-widest">
          Already have an account? 
          <a routerLink="/login" class="text-black font-black hover:underline underline-offset-4 ml-2">Log in</a>
        </p>
      </div>
    </app-card>
  </main>
</div>
