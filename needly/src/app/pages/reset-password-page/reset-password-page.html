<div class="min-h-screen flex flex-col items-center justify-center bg-white p-6 font-body">
  <main class="w-full max-w-md">
    <!-- Center-aligned Logo -->
    <div class="flex flex-col items-center mb-10">
      <app-logo variant="long" customClass="mb-6"></app-logo>
      <h1 class="text-3xl font-bold text-black mb-2 uppercase tracking-tight" style="font-family: 'Manrope', sans-serif;">Reset Password</h1>
      <p class="text-slate-500 text-center text-sm uppercase tracking-widest">Enter your new password below.</p>
    </div>

    <div *ngIf="error()" class="bg-red-50 text-red-600 p-3 text-xs font-bold uppercase tracking-wider border border-red-100 mb-6 flex items-center">
      <span class="material-symbols-outlined text-lg mr-2">error</span>
      {{ error() }}
    </div>

    <div *ngIf="auth.error()" class="bg-red-50 text-red-600 p-3 text-xs font-bold uppercase tracking-wider border border-red-100 mb-6">
      {{ auth.error() }}
    </div>

    <form *ngIf="token" class="space-y-6" (submit)="onSubmit()">
      <app-input
        label="New Password"
        type="password"
        placeholder="••••••••"
        id="password"
        [(value)]="password"
        name="password"
      ></app-input>

      <app-input
        label="Confirm New Password"
        type="password"
        placeholder="••••••••"
        id="confirmPassword"
        [(value)]="confirmPassword"
        name="confirmPassword"
      ></app-input>

      <div class="pt-2">
        <app-button variant="primary" type="submit" [disabled]="auth.loading()">
          {{ auth.loading() ? 'UPDATING...' : 'UPDATE PASSWORD' }}
        </app-button>
      </div>
    </form>

    <div *ngIf="!token" class="text-center mt-6">
      <app-button variant="secondary" routerLink="/login">BACK TO SIGN IN</app-button>
    </div>
    
    <p class="mt-10 text-center text-[0.6875rem] text-slate-500 uppercase tracking-widest">
      Go back to 
      <a routerLink="/login" class="text-black font-black hover:underline underline-offset-4 ml-2">Sign in</a>
    </p>
  </main>
</div>
