<div class="bg-white w-full flex flex-col font-body h-full overflow-hidden">
  <!-- Form Content -->
  <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-6">
    <!-- Error Message -->
    <div *ngIf="error()"
      class="bg-red-50 text-red-600 p-3 text-xs font-bold uppercase tracking-wider border border-red-100">
      {{ error() }}
    </div>

    <!-- App Info -->
    <div class="flex flex-col gap-2">
      <label class="text-[0.625rem] font-black text-black uppercase tracking-[0.15em] ml-1">Product Name*</label>
      <input type="text" [(ngModel)]="newProduct.name" placeholder="E.G. needly"
        class="w-full bg-white border-2 border-black p-3 text-sm font-bold tracking-wider placeholder:text-slate-300 focus:outline-none">
    </div>

    <div class="flex flex-col sm:flex-row gap-6">
      <div class="flex flex-col gap-2 flex-1">
        <label class="text-[0.625rem] font-black text-black uppercase tracking-[0.15em] ml-1">Tagline*</label>
        <input type="text" [(ngModel)]="newProduct.tagline" placeholder="THE SMARTEST WAY TO BUILD"
          class="w-full bg-white border-2 border-black p-3 text-sm font-bold tracking-wider placeholder:text-slate-300 focus:outline-none">
      </div>
      <div class="flex flex-col gap-2 flex-1">
        <label class="text-[0.625rem] font-black text-black uppercase tracking-[0.15em] ml-1">Category*</label>
        <select [(ngModel)]="newProduct.category"
          class="bg-white text-black border-2 border-black p-3 text-sm font-bold tracking-wider focus:outline-none appearance-none rounded-none w-full">
          <option *ngFor="let cat of categories" [value]="cat">{{ cat | uppercase }}</option>
        </select>
      </div>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-[0.625rem] font-black text-black uppercase tracking-[0.15em] ml-1">Pitch / Description*</label>
      <textarea [(ngModel)]="newProduct.description"
        placeholder="DESCRIBE THE PROBLEM YOU ARE SOLVING AND YOUR UNIQUE SOLUTION..." rows="4"
        class="w-full bg-white border-2 border-black p-3 text-sm resize-none focus:outline-none placeholder:text-slate-300">
      </textarea>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-[0.625rem] font-black text-black uppercase tracking-[0.15em] ml-1">Website URL*</label>
      <input type="url" [(ngModel)]="newProduct.websiteUrl" placeholder="HTTPS://needly.APP"
        class="w-full bg-white border-2 border-black p-3 text-sm font-bold tracking-wider placeholder:text-slate-300 focus:outline-none">
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-[0.625rem] font-black text-black uppercase tracking-[0.15em] ml-1">Product Logo</label>
      <div class="flex items-center gap-4">
        <div class="relative group">
          <img [src]="newProduct.logo || 'https://api.dicebear.com/7.x/identicon/svg?seed=' + newProduct.name"
            class="w-16 h-16 rounded-lg border-2 border-black bg-white object-cover shadow-[3px_3px_0px_0px_rgba(0,0,0,1)]">
          <div *ngIf="uploadingLogo()"
            class="absolute inset-0 bg-black/40 rounded-lg flex items-center justify-center backdrop-blur-sm">
            <div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
          </div>
        </div>

        <div class="flex flex-col gap-2 flex-1">
          <button (click)="logoInput.click()" [disabled]="uploadingLogo() || loading()"
            class="bg-white text-black px-4 py-2 text-[10px] font-black uppercase tracking-widest border-2 border-black hover:bg-slate-50 transition-all cursor-pointer disabled:opacity-50">
            {{ uploadingLogo() ? 'Uploading...' : 'Upload Logo Image' }}
          </button>
          <input #logoInput type="file" (change)="onLogoSelected($event)" accept="image/*" class="hidden">
          <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Square image works best. Max 5MB.</p>
        </div>
      </div>
    </div>

    <!-- POST BUTTON -->
    <div class="mt-6">
      <button
        class="w-full bg-black text-white p-4 text-xs font-black uppercase tracking-widest border-2 border-black hover:bg-slate-800 transition-all cursor-pointer shadow-[4px_4px_0px_0px_rgba(0,0,0,0.3)] hover:shadow-none hover:translate-x-[2px] hover:translate-y-[2px] disabled:bg-slate-400 disabled:border-slate-400 disabled:cursor-not-allowed"
        [disabled]="loading()" (click)="submitProduct()">
        {{ loading() ? 'POSTING...' : 'POST' }}
      </button>
    </div>
  </div>
</div>
