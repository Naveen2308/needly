<div class="fixed inset-0 bg-black/50 flex justify-center items-end sm:items-center z-[2000] backdrop-blur-sm" (click)="close.emit()">
  <div class="bg-white w-full max-w-[500px] sm:max-h-[80vh] h-[70vh] sm:h-auto sm:border-2 sm:border-black sm:shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] flex flex-col rounded-t-2xl sm:rounded-none" (click)="$event.stopPropagation()">
    
    <!-- Header -->
    <header class="flex justify-between items-center p-4 border-b border-black/10">
      <h3 class="text-sm font-black uppercase tracking-tight m-0 text-black">Comments</h3>
      <button class="bg-transparent border-none text-slate-400 hover:text-black cursor-pointer p-1 transition-colors" (click)="close.emit()">
        <span class="material-symbols-outlined" style="font-size: 20px;">close</span>
      </button>
    </header>

    <!-- Comments List -->
    <div class="flex-1 overflow-y-auto p-4" style="scrollbar-width: thin;">
      <div *ngFor="let comment of comments()" class="flex gap-3 mb-5">
        <img [src]="comment.user?.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + (comment.user?.name || 'user')" 
          class="w-8 h-8 rounded-full border border-black/10 object-cover flex-shrink-0 mt-0.5">
        <div class="flex-1">
          <div class="flex items-center gap-2">
            <span class="text-xs font-black text-black">{{ comment.user?.name || 'User' }}</span>
            <span class="text-[9px] font-bold text-slate-400">{{ getTimeAgo(comment.createdAt) }}</span>
          </div>
          <p class="text-sm text-slate-700 mt-1 leading-relaxed m-0">
            {{ isExpanded(comment.id) || comment.text.length <= 120 ? comment.text : (comment.text | slice:0:120) + '...' }}
            <button *ngIf="comment.text.length > 120" (click)="toggleExpand(comment.id)" class="inline-block bg-transparent border-none text-[10px] font-black text-blue-600 hover:text-blue-800 transition-colors p-0 ml-1 cursor-pointer align-baseline">
              {{ isExpanded(comment.id) ? 'Show Less' : 'Show More' }}
            </button>
          </p>
        </div>
      </div>

      <!-- Empty State -->
      <div class="flex flex-col items-center justify-center py-12 text-center" *ngIf="comments().length === 0">
        <span class="material-symbols-outlined text-3xl text-slate-200 mb-2" style="font-variation-settings: 'FILL' 0;">chat_bubble</span>
        <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400">No comments yet. Be the first!</p>
      </div>
    </div>

    <!-- Comment Input -->
    <div class="p-3 border-t border-black/10 flex items-center gap-3">
      <img [src]="authService.user()?.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=me'" 
        class="w-8 h-8 rounded-full border border-black/10 object-cover flex-shrink-0">
      <div class="flex-1 relative">
        <input 
          type="text" 
          [(ngModel)]="commentText" 
          (keydown.enter)="submitComment()"
          placeholder="Add a comment..."
          class="w-full bg-slate-50 border border-black/10 rounded-full px-4 py-2.5 text-sm focus:outline-none focus:border-black/30 transition-colors placeholder:text-slate-400">
      </div>
      <button 
        (click)="submitComment()" 
        [disabled]="submitting() || !commentText.trim()"
        class="bg-transparent border-none text-blue-600 font-black text-xs uppercase tracking-wider cursor-pointer disabled:text-slate-300 hover:text-blue-800 transition-colors px-2">
        {{ submitting() ? '...' : 'Post' }}
      </button>
    </div>
  </div>
</div>
